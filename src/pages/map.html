<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>OCDLA Geo Data | Development</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=overlays-content" />
    <!-- <link rel="manifest" href="manifest.json" /> -->
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <meta name="googlebot-news" content="noindex, nofollow" />
    <meta name="slurp" content="noindex, nofollow" />
    <meta name="msnbot" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@100;200;300;400;500&family=Nanum+Pen+Script&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet" />

    <style>
        label,
        button {
            font-family: 'Lato', sans-serif;
            display: block;
        }

        /* Add flexbox layout */
        #app {
            display: flex;
            gap: 20px;
            margin-top: 100px;
        }

        #form-container {
            flex: 1;
            min-width: 0;
        }

        #map {
            flex: 1;
            min-width: 400px;
            height: 600px;
            border: 1px solid #ccc;
            position: sticky;
            top: 20px;
        }

        .address-field {
            font-weight: bold;
            min-width: 600px;
            display: inline-block;
        }

        .house-district-field {
            color: blue;
            width: 150px;
            display: inline-block;
        }

        .senate-district-field {
            color: green;
            width: 150px;
            display: inline-block;
        }

        .address-field,
        .house-district-field,
        .senate-district-field {
            margin-right: 10px;
            font-size: larger;
            padding: 15px;
        }

        .table {
            display: table;
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .table-row {
            display: table-row;
        }

        .table-cell {
            display: table-cell;
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        .table-cell:nth-child(1) {
            width: 100%;
        }
    </style>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

</head>

<body id="root" class="text-sm invisible bg-default-background">
    <script>0</script>

    <div id="app">

        <div id="form-container" style="max-width:35%;">
            <form id="district-lookup" method="post">
                <label style="font-size: larger;" for="address">Enter Address:</label>
                <textarea style="padding:10px; font-size:larger;" id="address" name="address" rows="3" cols="60">118 NW Jackson Ave. Corvallis, Oregon 97330</textarea>

                <button style="padding:10px; font-size:larger; margin-top:5px;" id="find-district" type="submit">Find district</button>

                <label htmlFor="district-select">Show info for:</label>
                    <select id="district-select">
                        <option value="">--Select a district--</option>
                        <option value="house">House Districts</option>
                        <option value="senate">Senate Districts</option>
                    </select>
                <input type="checkbox" id="order-by-district">Group by District</input>

                <div id="result"></div>
            </form>
        </div>

        <div id="map" style="width:70%;"></div>
    </div>

    <div class="column main">


        <div class="content">


        </div><!-- end content -->


    </div>


    <div class="column column-right" id="picker">

        <div id="picker-content">

            <apex:form>

                <apex:selectList size="1" styleClass="subject-picker">
                    <apex:selectOptions value="{!subjects}" />
                </apex:selectList>
            </apex:form>

            <div id="picker-list">

            </div>
        </div>
    </div>


    <noscript>
        <style>
            body {
                visibility: visible;
            }
        </style>
        This page requires JavaScript.
    </noscript>


    <script src="/sw.js"></script>
</body>




</html>
